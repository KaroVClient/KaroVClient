<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KaroV Client</title>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');

    html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0d0d0d;
        font-family: 'Orbitron', sans-serif;
    }

    body {
        background: linear-gradient(120deg, #080808, #1a0a1a, #080808);
        animation: bgmove 20s infinite alternate ease-in-out;
    }

    @keyframes bgmove {
        0% { background-position: 0% 50%; }
        100% { background-position: 100% 50%; }
    }

    header {
        position: relative;
        text-align: center;
        padding-top: 130px;
        z-index: 2;
    }

    h1 {
        font-size: 4em;
        color: #ffd700;
        text-shadow: 0 0 25px #ffd700, 0 0 50px #e5c100;
        animation: neon 2s infinite ease-in-out;
    }

    @keyframes neon {
        0%, 100% { text-shadow: 0 0 15px #ffd700, 0 0 30px #e5c100; }
        50% { text-shadow: 0 0 35px #ffd700, 0 0 70px #e5c100; }
    }

    p {
        color: #ccc;
        font-size: 1.3em;
        margin-top: -5px;
    }

    .download-btn {
        display: inline-block;
        margin-top: 50px;
        padding: 18px 60px;
        font-size: 1.5em;
        font-weight: bold;
        color: #0d0d0d;
        background: linear-gradient(45deg, #e5c100, #ffd700);
        border-radius: 15px;
        text-decoration: none;
        box-shadow: 0 0 30px #ffd700, 0 0 60px #e5c100;
        animation: btnGlow 2s infinite alternate ease-in-out;
        position: relative;
        z-index: 2;
    }

    .download-btn:hover {
        transform: scale(1.12);
        box-shadow: 0 0 40px #ffd700, 0 0 80px #e5c100;
    }

    @keyframes btnGlow {
        0% { box-shadow: 0 0 20px #e5c100, 0 0 40px #ffd700; }
        100% { box-shadow: 0 0 30px #ffd700, 0 0 60px #e5c100; }
    }

    footer {
        position: absolute;
        bottom: 20px;
        width: 100%;
        text-align: center;
        color: #aaa;
        font-size: 0.9em;
        z-index: 2;
    }

    footer a {
        color: #d58fff;
        text-decoration: none;
    }

    footer a:hover {
        text-decoration: underline;
    }

    /* Estrellas doradas en movimiento */
    .star {
        position: absolute;
        background: #ffd700;
        border-radius: 50%;
        opacity: 0.85;
        animation: fall linear infinite;
    }

    @keyframes fall {
        0% { transform: translateY(-20px) scale(1); opacity: 0.7; }
        100% { transform: translateY(110vh) scale(0.5); opacity: 0; }
    }
</style>
</head>
<body>

<header>
    <h1>KaroV Client</h1>
    <p>El cliente de Minecraft que lleva tu juego al siguiente nivel.</p>
    <a href="https://example.com/download" class="download-btn">Download</a>
</header>

<footer>
    <p>Creado por Lu heej and JAP4. Soporte en 
       <a href="https://discord.gg/YjhfZNFt" target="_blank">Discord</a>.
    </p>
</footer>

<script>
    const numStars = 200;
    for(let i = 0; i < numStars; i++){
        const star = document.createElement("div");
        star.className = "star";
        star.style.width = star.style.height = `${Math.random() * 3 + 1}px`;
        star.style.top = `${Math.random() * -200}px`;
        star.style.left = `${Math.random() * 100}vw`;
        star.style.animationDuration = `${Math.random() * 7 + 3}s`;
        document.body.appendChild(star);
    }

    document.body.addEventListener("mousemove", function(e) {
        document.querySelectorAll(".star").forEach(star => {
            const dx = star.offsetLeft - e.clientX;
            const dy = star.offsetTop - e.clientY;
            const dist = Math.sqrt(dx*dx + dy*dy);
            if(dist < 120) {
                star.style.transform = `scale(1.5)`;
            } else {
                star.style.transform = `scale(1)`;
            }
        });
    });
</script>

</body>
</html>
